# ============================================================
# AI BeatSync Studio — CI/CD për Windows
# Ndërton aplikacionin + installer-in NSIS (.exe) automatikisht
# në çdo push. Shkarko artifact-in nga tab-i "Actions".
# ============================================================
name: Build Windows Installer

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build & Package (Windows x64)
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      # ---------- 1. Kodi ----------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- 2. Node.js 20 ----------
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ---------- 3. Rust stable ----------
      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ---------- 4. Varësitë npm (përfshin Tauri CLI) ----------
      - name: Install npm dependencies (incl. Tauri CLI)
        run: npm ci

      - name: Verify Tauri CLI
        run: npx tauri --version

      # ---------- 5. FFmpeg (paketohet brenda installer-it) ----------
      - name: Download FFmpeg for bundling
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg-tmp
          $dir = Get-ChildItem ffmpeg-tmp -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path src-tauri/bin | Out-Null
          Copy-Item "$($dir.FullName)/bin/ffmpeg.exe"  src-tauri/bin/
          Copy-Item "$($dir.FullName)/bin/ffprobe.exe" src-tauri/bin/
          Write-Host "FFmpeg OK:"
          Get-ChildItem src-tauri/bin

      # ---------- 6. Build + NSIS installer ----------
      - name: Build Tauri app (NSIS installer)
        run: npx tauri build
        env:
          CI: true

      # ---------- 7. Emërtimi final i installer-it ----------
      - name: Rename installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if (-not $nsis) { throw "Installer-i NSIS nuk u gjet!" }
          New-Item -ItemType Directory -Force -Path release-out | Out-Null
          Copy-Item $nsis.FullName "release-out/AI_BeatSync_Studio_x64-setup.exe"
          Get-ChildItem release-out

      # ---------- 8. Ngarkimi si artifact ----------
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI_BeatSync_Studio_x64-setup
          path: release-out/AI_BeatSync_Studio_x64-setup.exe
          if-no-files-found: error
          retention-days: 30
